<!DOCTYPE html>
<html lang="ru">
<head>
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta charset="UTF-8">
  <title>Подтверждение места</title>
  <style>
    @import url("https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap");

    :root {
      --bg:       #0c0c10;
      --surface:  #13131a;
      --surface2: #1c1c26;
      --border:   #2a2a3a;
      --accent:   #4cc9f0;
      --accent2:  #7b5ea7;
      --text:     #dde1f0;
      --text-dim: #7e849e;
      --text-hint:#50546a;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "DM Sans", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 16px 48px;
    }

    .page-card {
      width: 100%;
      max-width: 900px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 28px 32px 32px;
      box-shadow: 0 0 60px rgba(76,201,240,0.04), 0 8px 40px rgba(0,0,0,0.5);
      position: relative;
      display: flex;
      flex-direction: column;
      gap: 0;
    }
    .page-card::before {
      content: "";
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, var(--accent2), var(--accent));
      border-radius: 18px 18px 0 0;
    }

    /* Шапка со стрелкой назад */
    .card-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 28px;
    }

    .back-button {
      font-size: 18px;
      color: var(--accent);
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      cursor: pointer;
      padding: 5px 11px;
      transition: background 0.2s, border-color 0.2s;
      line-height: 1.4;
      flex-shrink: 0;
    }
    .back-button:hover {
      background: var(--border);
      border-color: var(--accent);
    }

    .page-title {
      font-family: "Syne", sans-serif;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--text-dim);
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    /* Основной текст события */
    .event-block h1 {
      font-family: "Syne", sans-serif;
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--text);
      line-height: 1.35;
      margin-bottom: 10px;
      word-break: break-word;
    }
    .event-block .comment {
      font-size: 0.92rem;
      color: var(--text-dim);
      line-height: 1.6;
      word-break: break-word;
    }

    .divider {
      height: 1px;
      background: var(--border);
      margin: 22px 0;
    }

    /* Блок покупателя */
    .buyer-row {
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 16px;
      margin-bottom: 24px;
    }
    .buyer-icon {
      font-size: 1.3rem;
      flex-shrink: 0;
    }
    .buyer-name {
      font-family: "Syne", sans-serif;
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--text);
    }

    /* Кнопка «Оплатить» */
    .neon-btn {
      display: block;
      width: 100%;
      border: 1px solid var(--accent);
      background: transparent;
      color: var(--accent);
      font-family: "Syne", sans-serif;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 16px;
      border-radius: 10px;
      cursor: pointer;
      text-align: center;
      transition: background 0.2s, box-shadow 0.2s, color 0.2s;
    }
    .neon-btn:hover {
      background: var(--accent);
      color: var(--bg);
      box-shadow: 0 0 32px rgba(76,201,240,0.35);
    }

    .footer-hint {
      text-align: center;
      color: var(--text-hint);
      font-size: 0.73rem;
      margin-top: 16px;
      letter-spacing: 0.04em;
    }
  </style>
</head>
<body>

<div class="page-card">

  <!-- Кнопка назад — отдельная форма -->
  <form method="post">
    {% csrf_token %}
    <div class="card-header">
      <button class="back-button" name="chair_but" value="{{ back_value }}">&#8592;</button>
      <span class="page-title">Подтверждение</span>
    </div>
    <input type="hidden" name="user_id" value="" id="profNameInput">
  </form>

  <!-- Информация о событии -->
  <div class="event-block">
    <h1>{{ text|linebreaksbr }}</h1>
    <div class="comment">{{ comment|linebreaksbr }}</div>
  </div>

  <div class="divider"></div>

  <!-- Покупатель -->
  <div class="buyer-row">
    <div class="buyer-icon">👤</div>
    <div class="buyer-name">{{ fio }}</div>
  </div>

  <!-- Оплата — отдельная форма -->
  <form method="post">
    {% csrf_token %}
    <button type="submit" name="chair_but" value="{{ button_value }}" class="neon-btn">
      Оплатить
    </button>
    <input type="hidden" name="user_id" value="" id="profNameInput2">
  </form>

  <p class="footer-hint">Доступна оплата только по Пушкинской карте</p>

</div>

</body>
</html>
