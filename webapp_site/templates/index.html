{% load static %}
<!DOCTYPE html>
<html>
<head>
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <meta charset="UTF-8">
    <title>Выберите место</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
      body {
        color: var(--tg-theme-text-color);
        background: var(--tg-theme-bg-color);
        display: flex;
        flex-direction: column;
        align-items: center;
        font-size: 18px;
        position: relative; /* Добавляем позиционирование */
        min-height: 100vh; /* Устанавливаем минимальную высоту body на весь экран */
      }
      }

      .hint {
        color: var(--tg-theme-hint-color);
      }

      .link {
        color: var(--tg-theme-link-color);
      }


      #usercard {
        text-align: center;
      }

      /* Стили для кнопок */
      #seatMap {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        max-width: 100%;
      }

      .row {
        display: flex;
        justify-content: center;
        width: 100%;
        margin-bottom: 2px;/* расстояние между рядами */
      }

      .button {
        flex: 1;
        margin: 0px;/* расстояние между сидениями в ряду */
        padding: 0;
        background-color: transparent;
        border: none;
        margin-top: 3px; /* Расстояние между рядами */
      }

      .button img {
        max-width: 100%;
        height: auto;
        display: block;
        margin: 0 auto;
      }
      
      .button[disabled] {
      pointer-events: none;
    }
     .screen {
        max-width: 100%;
        margin-bottom: 70px; /* отступ после экрана */
      }
    
     h1 {
        margin-top: auto; /* Перемещаем надпись в самый низ */
        margin-bottom: 20px; /* Опциональный отступ от нижнего края */
      }
      
    </style>
</head>
<body>
    <script>
       let tg = window.Telegram.WebApp; // получаем объект webapp телеграма 
    
       tg.expand(); // расширяем на все окно  
       tg.enableClosingConfirmation() // запрашиваем подтверждение закрытия вебапп
       let profName = document.createElement('p');
       profName.innerText = `${tg.initDataUnsafe.user.id}`;
    </script>
    
    
    <img src="{% static 'screen.svg' %}" alt="Экран" class="screen">


    
    <form method="post">
        {% csrf_token %}
        {{ form }}
        <div id="seatMap">
            {% for row in seatMap %}
    <div class="row">
        {% for seat in row %}
            {% if seat == 'occ' %}
                <button type="button" class="button disabled" disabled>
                  <img src="{% static 'chair_grey.png' %}" alt="занято">
                </button>
            {% elif seat == 'empt' %}
                <div class="button" class="button disabled" disabled></div>
            {% else %}
                <button type="submit" name="chair_but" value={{ seat }} class="button">
                    <img src="{% static 'chair.png' %}" alt="кресло">
                </button>
            {% endif %}
        {% endfor %}
    </div>
{% endfor %}
        </div>
        <input type="hidden" name="user_id" value="" id="profNameInput">
    </form>
    
    <h1>{{ down_text }}</h1>
    

    <script>
        // Устанавливаем значение скрытого поля равным profName.innerText
        const profNameInput = document.getElementById('profNameInput');
        profNameInput.value = profName.innerText;
    </script>
    
</body>
</html>
