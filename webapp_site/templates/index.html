{% load static %}
<!doctype html>
<html lang="ru">
  <head>
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta charset="UTF-8" />
    <title>Выберите место</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap");
      :root {
        --bg: #0c0c10;
        --surface: #13131a;
        --surface2: #1c1c26;
        --border: #2a2a3a;
        --accent: #4cc9f0;
        --accent2: #7b5ea7;
        --text: #dde1f0;
        --text-dim: #7e849e;
        --text-hint: #50546a;
      }
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: "DM Sans", sans-serif;
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
        display: flex;
        justify-content: center;
        padding: 20px 12px;
      }
      .page-card {
        width: 100%;
        max-width: 900px;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 18px;
        padding: clamp(16px, 3vw, 28px);
        box-shadow:
          0 0 60px rgba(76, 201, 240, 0.05),
          0 8px 40px rgba(0, 0, 0, 0.6);
      } /* СЦЕНА */
      .screen-wrap {
        text-align: center;
        margin-bottom: 18px;
      }
      .screen-wrap img {
        width: 100%;
        max-width: 500px;
        filter: drop-shadow(0 0 12px rgba(76, 201, 240, 0.25));
      } /* ЮЗЕР */
      .user-label {
        font-family: "Syne", sans-serif;
        font-size: 0.8rem;
        font-weight: 600;
        color: var(--text-dim);
        text-align: center;
        margin-bottom: 16px;
        padding: 6px 12px;
        background: var(--surface2);
        border-radius: 20px;
        border: 1px solid var(--border);
      } /* СХЕМА */
      #seatMap {
        width: 100%;
        display: flex;
        flex-direction: column;
        gap: 1px;
      }

      /* КАЖДЫЙ РЯД */
      .row {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(0, 1fr));
        gap: 1px;
        width: 100%;
      }
      .button {
        width: 100%;
        aspect-ratio: 1 / 1;
        border: none;
        background: transparent;
        padding: 0;
      }

      .button img {
        width: 100%;
        height: 100%;
        object-fit: contain;
      }
      .button:hover img {
        filter: drop-shadow(0 0 6px var(--accent));
      }
      .button[disabled] {
        opacity: 0.4;
        pointer-events: none;
      } /* ЛЕГЕНДА */
      .legend {
        display: flex;
        justify-content: center;
        gap: 18px;
        margin-top: 16px;
        font-size: 0.75rem;
        color: var(--text-dim);
      }
      .legend-item {
        display: flex;
        align-items: center;
        gap: 6px;
      }
      .legend-dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
      }
      .dot-free {
        background: var(--accent);
      }
      .dot-taken {
        background: #444;
      }
      .divider {
        height: 1px;
        background: var(--border);
        margin: 18px 0;
      }
      .footer-hint {
        text-align: center;
        color: var(--text-hint);
        font-size: 0.75rem;
      }
    </style>
  </head>
  <body>
    <div class="page-card">
      <div class="screen-wrap">
        <img src="{% static 'screen.svg' %}" alt="Сцена" />
      </div>

      <div class="user-label">{{ fio }}</div>

      <form method="post">
        {% csrf_token %} {{ form }}
        <div id="seatMap">
          {% for row in seatMap %}
          <div class="row">
            {% for seat in row %} {% if seat == 'occ' %}
            <button type="button" class="button" disabled><img src="{% static 'chair_grey.png' %}" /></button>
            {% elif seat == 'empt' %}
            <div class="button"></div>
            {% else %}
            <button type="submit" name="chair_but" value="{{ seat }}" class="button">
              <img src="{% static 'chair.png' %}" />
            </button>
            {% endif %} {% endfor %}
          </div>
          {% endfor %}
        </div>
        <input type="hidden" name="user_id" id="profNameInput" />
      </form>
      <div class="legend">
        <div class="legend-item">
          <img src="{% static 'chair.png' %}" />
          свободно
        </div>
        <div class="legend-item">
          <img src="{% static 'chair_grey.png' %}" />
          занято
        </div>
      </div>
      {% if down_text %}
      <div class="divider"></div>
      <p class="footer-hint">{{ down_text }}</p>
      {% endif %}
    </div>
  </body>
</html>
