<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Оплата</title>
</head>
<body>

{% if close_webapp %}
<script>
    fetch('/process_payment/', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
            'X-CSRFToken': '{{ csrf_token }}'
        },
        body: JSON.stringify({
            "order_id": "{{ order_id }}",
            "iframe_url": "{{ iframe_url }}",
            "query_id": "{{ user_id }}"
        })
    })
    .then(response => response.json())
    .then(data => {
        // Закрываем WebApp только после успешного запроса
        if (data.status === 'success') {
            tg.close();
        } else {
            alert('Ошибка: ' + data.message);
        }
    })
    .catch(error => {
        console.error('Ошибка:', error);
    });
</script>
{% endif %}
</body>
</html>
